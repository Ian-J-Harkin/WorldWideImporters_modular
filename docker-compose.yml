services:
  postgres:
    image: postgres:latest
    environment:
      - POSTGRES_USER=wwi_admin
      - POSTGRES_PASSWORD=wwi_password
      - POSTGRES_DB=wwi_modular_monolith
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

volumes:
  postgres_data:
