<div class="min-h-screen bg-gray-50 flex flex-col font-sans text-gray-900">
  <!-- Top Bar: Multi-Tenancy Guardrail Manager -->
  <header class="bg-gray-900 text-white p-4 shadow-xl z-50">
    <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <div
          class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-xl shadow-lg shadow-blue-500/20">
          W</div>
        <h1 class="text-xl font-bold tracking-tight">{{ title() }}</h1>
      </div>

      <div class="flex items-center gap-4 bg-gray-800 p-2 rounded-xl border border-gray-700">
        <div class="flex items-center gap-2 px-3">
          <div class="w-2 h-2 rounded-full"
            [class]="tenantService.currentTenantId() ? 'bg-green-500 animate-pulse' : 'bg-red-500'"></div>
          <span class="text-xs font-mono text-gray-400">
            Tenant: {{ tenantService.currentTenantId() || 'NOT SET (Requests will fail)' }}
          </span>
        </div>

        @if (!tenantService.currentTenantId()) {
        <button (click)="setTestTenant()"
          class="px-4 py-1.5 bg-blue-600 hover:bg-blue-500 text-sm font-bold rounded-lg transition-all active:scale-95 shadow-lg shadow-blue-500/10">
          Fix: Set Test Tenant
        </button>
        } @else {
        <button (click)="tenantService.setTenant('')"
          class="px-4 py-1.5 bg-red-600/20 hover:bg-red-600/30 text-red-400 text-sm font-bold rounded-lg transition-all hover:text-red-300">
          Reset
        </button>
        }
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="flex-1 overflow-y-auto">
    <router-outlet></router-outlet>
  </main>

  <!-- Production Status Footer -->
  <footer class="bg-white border-t border-gray-200 p-4 text-center">
    <p class="text-xs text-gray-400 uppercase tracking-widest font-semibold flex items-center justify-center gap-2">
      <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
      WWI Modular Monolith Kit • Production Grade Platform
    </p>
  </footer>
</div>
